
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Press Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #output {
            font-size: 24px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Key Press Test</h1>
    <p>Press two number keys along with either the right or left arrow key:</p>
    <div id="output">0</div>
    <script>
var isKeyPressed = {};

function updateDisplay() {
    var numberKeys = 0;
    var arrowKey = 0;
    
    // Count the number of pressed number keys
    for (var i = 0; i <= 9; i++) {
        if (isKeyPressed[i.toString()]) {
            numberKeys++;
        }
    }

    // Check for pressed arrow keys
    if (isKeyPressed['ArrowRight']) {
        arrowKey = 1;
    } else if (isKeyPressed['ArrowLeft']) {
        arrowKey = -1;
    }

    // Update display based on conditions
    if (numberKeys === 2 && arrowKey !== 0) {
        document.getElementById('output').innerText = arrowKey.toString();
    } else {
        document.getElementById('output').innerText = '0';
    }
}

document.addEventListener('keydown', function(event) {
    isKeyPressed[event.key] = true;
    updateDisplay();
});

document.addEventListener('keyup', function(event) {
    isKeyPressed[event.key] = false;
    updateDisplay();
});

        var numberKeys = 0;
        var rightArrow = false;
        var leftArrow = false;

        function updateDisplay() {
            if (numberKeys === 2) {
                if (rightArrow) {
                    document.getElementById('output').innerText = '1';
                } else if (leftArrow) {
                    document.getElementById('output').innerText = '-1';
                }
            } else {
                document.getElementById('output').innerText = '0';
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key >= '0' && event.key <= '9') {
                numberKeys++;
            } else if (event.key === 'ArrowRight') {
                rightArrow = true;
            } else if (event.key === 'ArrowLeft') {
                leftArrow = true;
            }
            updateDisplay();
        });

        document.addEventListener('keyup', function(event) {
            if (event.key >= '0' && event.key <= '9') {
                numberKeys--;
            } else if (event.key === 'ArrowRight') {
                rightArrow = false;
            } else if (event.key === 'ArrowLeft') {
                leftArrow = false;
            }
            updateDisplay();
        });
    </script>
</body>
</html>
