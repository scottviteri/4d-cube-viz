
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tetrahedron WebGL</title>
</head>
<body>
    <canvas id="canvas" width="800" height="800"></canvas>
<script>
var canvas = document.getElementById('canvas');
var gl = canvas.getContext('webgl');
gl.viewport(0, 0, canvas.width, canvas.height);
gl.clearColor(0, 0, 1, 1); // Blue color
gl.clear(gl.COLOR_BUFFER_BIT);

function createShader(gl, type, source) {
    var shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    return shader;
}

function createPerspectiveMatrix(fov, aspect, near, far) {
    var f = Math.tan(Math.PI * 0.5 - 0.5 * fov);
    var rangeInv = 1.0 / (near - far);

    return new Float32Array([
        f / aspect, 0, 0, 0,
        0, f, 0, 0,
        0, 0, (near + far) * rangeInv, -1,
        0, 0, near * far * rangeInv * 2, 0
    ]);
}

var perspectiveMatrix = createPerspectiveMatrix(Math.PI / 4, canvas.width / canvas.height, 0.1, 100);

var vertices = new Float32Array([
    0, 1, -5,
    -1, -1, -5,
    1, -1, -5,
    0, -1, -3
]);

var modelViewMatrix = new Float32Array([
    0.5, 0, 0, 0,
    0, 0.5, 0, 0,
    0, 0, 0.5, -5,
    0, 0, 0, 1
]);

function createRotationMatrix(angleX, angleY, angleZ) {
    var cosX = Math.cos(angleX);
    var sinX = Math.sin(angleX);
    var cosY = Math.cos(angleY);
    var sinY = Math.sin(angleY);
    var cosZ = Math.cos(angleZ);
    var sinZ = Math.sin(angleZ);

    return new Float32Array([
        cosY * cosZ, -cosY * sinZ, sinY, 0,
        sinX * sinY * cosZ + cosX * sinZ, -sinX * sinY * sinZ + cosX * cosZ, -sinX * cosY, 0,
        -cosX * sinY * cosZ + sinX * sinZ, cosX * sinY * sinZ + sinX * cosZ, cosX * cosY, 0,
        0, 0, 0, 1
    ]);
}

function createTranslationMatrix(tx, ty, tz) {
    return new Float32Array([
        1, 0, 0, tx,
        0, 1, 0, ty,
        0, 0, 1, tz,
        0, 0, 0, 1
    ]);
}

function multiplyMatrices(a, b) {
    var result = new Float32Array(16);
    for (var row = 0; row < 4; row++) {
        for (var col = 0; col < 4; col++) {
            result[row * 4 + col] = 0;
            for (var k = 0; k < 4; k++) {
                result[row * 4 + col] += a[row * 4 + k] * b[k * 4 + col];
            }
        }
    }
    return result;
}

var vertexShaderSource = `
    attribute vec4 a_position;
    uniform mat4 u_perspective;
    uniform mat4 u_modelView;
    void main() {
        gl_Position = u_perspective * u_modelView * a_position;
    }`;
var vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);

var fragmentShaderSource = `
    precision mediump float;
    void main() {
        gl_FragColor = vec4(1, 0, 0, 1); // Red color
    }`;
var fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

var program = gl.createProgram();
gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);
gl.linkProgram(program);

var positionAttributeLocation = gl.getAttribLocation(program, "a_position");
var perspectiveUniformLocation = gl.getUniformLocation(program, "u_perspective");
var modelViewUniformLocation = gl.getUniformLocation(program, "u_modelView");

var positionBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

gl.viewport(0, 0, canvas.width, canvas.height);
gl.clearColor(0, 0, 0, 1); // Black background
gl.clear(gl.COLOR_BUFFER_BIT);

gl.useProgram(program);
gl.uniformMatrix4fv(perspectiveUniformLocation, false, perspectiveMatrix);
gl.uniformMatrix4fv(modelViewUniformLocation, false, modelViewMatrix);
gl.enableVertexAttribArray(positionAttributeLocation);
gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
gl.vertexAttribPointer(positionAttributeLocation, 3, gl.FLOAT, false, 0, 0); // 3D coordinates
gl.drawArrays(gl.TRIANGLES, 0, vertices.length / 3);

var angleX = 0;
var angleY = 0;
var angleZ = 0;

function draw() {
    // Translate to origin
    var translationToOriginMatrix = createTranslationMatrix(0, 0, 5);
    
    // Rotate
    var rotationMatrix = createRotationMatrix(angleX, angleY, angleZ);
    
    // Translate back
    var translationBackMatrix = createTranslationMatrix(0, 0, -5);
    
    // Apply transformations in sequence
    var transformationMatrix = multiplyMatrices(translationBackMatrix, rotationMatrix);
    transformationMatrix = multiplyMatrices(transformationMatrix, translationToOriginMatrix);
    var finalModelViewMatrix = multiplyMatrices(transformationMatrix, modelViewMatrix);

    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0, 0, 0, 1); // Black background
    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.useProgram(program);
    gl.uniformMatrix4fv(perspectiveUniformLocation, false, perspectiveMatrix);
    gl.uniformMatrix4fv(modelViewUniformLocation, false, finalModelViewMatrix);
    gl.enableVertexAttribArray(positionAttributeLocation);
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    gl.vertexAttribPointer(positionAttributeLocation, 3, gl.FLOAT, false, 0, 0); // 3D coordinates
    gl.drawArrays(gl.TRIANGLES, 0, vertices.length / 3);

    angleX += 0.01;
    angleY += 0.02;
    angleZ += 0.03;

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
